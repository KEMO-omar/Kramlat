<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>رادار السحب | إمبراطورية كرملات 🍭</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --gold: #ffcc00;
            --primary: #f806cc;
            --secondary: #3f5efb;
            --bg: #050508;
        }

        body {
            margin: 0; padding: 0; font-family: 'Cairo', sans-serif;
            background: var(--bg); color: white; min-height: 100vh;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            overflow: hidden;
        }

        .container {
            text-align: center; z-index: 10; width: 90%; max-width: 600px;
        }

        h1 {
            font-size: 2.5rem; font-weight: 900; margin-bottom: 5px;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .stats {
            background: rgba(255,255,255,0.05); padding: 5px 20px;
            border-radius: 50px; font-size: 0.9rem; color: #aaa; margin-bottom: 30px;
            display: inline-block; border: 1px solid rgba(255,255,255,0.1);
        }

        /* منطقة السحب */
        .picker-box {
            height: 150px; background: rgba(255,255,255,0.03);
            border: 2px dashed rgba(255,255,255,0.2); border-radius: 20px;
            display: flex; align-items: center; justify-content: center;
            font-size: 2rem; font-weight: 900; margin-bottom: 30px;
            position: relative; overflow: hidden; transition: 0.3s;
        }

        .picker-box.active {
            border-style: solid; border-color: var(--primary);
            box-shadow: 0 0 30px rgba(248, 6, 204, 0.3);
        }

        .winner-display {
            display: none; animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn {
            0% { transform: scale(0); }
            100% { transform: scale(1.1); }
        }

        .btn-draw {
            padding: 18px 50px; font-size: 1.3rem; font-weight: 900;
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            border: none; border-radius: 15px; color: white; cursor: pointer;
            transition: 0.3s; box-shadow: 0 10px 30px rgba(63, 94, 251, 0.4);
        }

        .btn-draw:hover { transform: translateY(-5px); filter: brightness(1.2); }
        .btn-draw:disabled { background: #333; cursor: not-allowed; box-shadow: none; }

        .back-link {
            margin-top: 30px; text-decoration: none; color: #666; font-size: 0.9rem;
            display: block; transition: 0.3s;
        }
        .back-link:hover { color: white; }

        /* الأضواء الدوارة */
        .scan-line {
            position: absolute; width: 100%; height: 4px; background: var(--primary);
            top: 0; box-shadow: 0 0 20px var(--primary);
            animation: scan 2s infinite linear; display: none;
        }

        @keyframes scan {
            0% { top: 0; }
            100% { top: 100%; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div style="font-size: 4rem;">🎲</div>
        <h1>رادار السحب العشوائي</h1>
        <div class="stats" id="totalCount">جاري فحص المسجلين...</div>

        <div class="picker-box" id="pickerBox">
            <div id="scanLine" class="scan-line"></div>
            <div id="nameDisplay">جاهز للاختيار؟</div>
            
            <div class="winner-display" id="winnerUI">
                <div style="color: var(--gold); font-size: 1rem; margin-bottom: 5px;">🏆 الفـائـز الـمحـظـوظ 🏆</div>
                <div id="winnerName" style="color: #fff; text-shadow: 0 0 20px var(--primary);"></div>
            </div>
        </div>

        <button class="btn-draw" id="drawBtn">ابدأ السحب الآن 🔥</button>
        
        <a href="index.html" class="back-link">العودة للوحة الإمبراطور</a>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
        import { getDatabase, ref, get, child } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCZr_OpkCfEFxeTrOc5fp7F_uvyVGlT5Yc",
            authDomain: "karamlat-99e6e.firebaseapp.com",
            databaseURL: "https://karamlat-99e6e-default-rtdb.firebaseio.com",
            projectId: "karamlat-99e6e",
            storageBucket: "karamlat-99e6e.firebasestorage.app",
            messagingSenderId: "817474436731",
            appId: "1:817474436731:web:6b4c38fd98048f1a3b6cde"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let participants = [];

        // 1. سحب البيانات من فايربيز
        async function loadParticipants() {
            const dbRef = ref(db);
            try {
                const snapshot = await get(child(dbRef, 'registrations'));
                if (snapshot.exists()) {
                    const data = snapshot.val();
                    participants = Object.values(data).map(user => user.fullName);
                    document.getElementById('totalCount').innerText = `عدد المسجلين في الجيش: ${participants.length} وحش`;
                } else {
                    document.getElementById('totalCount').innerText = "لا يوجد مسجلين بعد!";
                    document.getElementById('drawBtn').disabled = true;
                }
            } catch (error) {
                console.error(error);
            }
        }

        loadParticipants();

        // 2. منطق السحب
        const drawBtn = document.getElementById('drawBtn');
        const pickerBox = document.getElementById('pickerBox');
        const nameDisplay = document.getElementById('nameDisplay');
        const winnerUI = document.getElementById('winnerUI');
        const winnerName = document.getElementById('winnerName');
        const scanLine = document.getElementById('scanLine');

        drawBtn.addEventListener('click', () => {
            if (participants.length === 0) return;

            drawBtn.disabled = true;
            nameDisplay.style.display = 'block';
            winnerUI.style.display = 'none';
            scanLine.style.display = 'block';
            pickerBox.classList.add('active');

            let counter = 0;
            let duration = 3000; // وقت اللف (3 ثواني)
            let intervalTime = 50;

            const interval = setInterval(() => {
                const randomIdx = Math.floor(Math.random() * participants.length);
                nameDisplay.innerText = participants[randomIdx];
                counter += intervalTime;

                if (counter >= duration) {
                    clearInterval(interval);
                    finalizeWinner();
                }
            }, intervalTime);
        });

        function finalizeWinner() {
            const finalIdx = Math.floor(Math.random() * participants.length);
            const winner = participants[finalIdx];

            scanLine.style.display = 'none';
            nameDisplay.style.display = 'none';
            winnerUI.style.display = 'block';
            winnerName.innerText = winner;
            
            // احتفال الـ Confetti
            confetti({
                particleCount: 150,
                spread: 70,
                origin: { y: 0.6 },
                colors: ['#f806cc', '#3f5efb', '#ffcc00']
            });

            drawBtn.innerText = "سحب مرة أخرى 🔄";
            drawBtn.disabled = false;
        }
    </script>
</body>
</html>
