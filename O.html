<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ماراثون السحب | إمبراطورية كرملات 👑</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --gold: #ffcc00;
            --primary: #f806cc;
            --secondary: #3f5efb;
            --bg: #050508;
            --danger: #ff4757;
        }

        body {
            margin: 0; padding: 0; font-family: 'Cairo', sans-serif;
            background: var(--bg); color: white; min-height: 100vh;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            overflow: hidden;
        }

        .container { text-align: center; z-index: 10; width: 90%; max-width: 600px; }

        h1 {
            font-size: 2.5rem; font-weight: 900; margin-bottom: 5px;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .stats-row { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; }
        
        .badge {
            background: rgba(255,255,255,0.05); padding: 5px 15px;
            border-radius: 50px; font-size: 0.85rem; color: #aaa;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .timer-badge { color: var(--primary); font-weight: bold; border-color: var(--primary); }

        .picker-box {
            height: 180px; background: rgba(255,255,255,0.02);
            border: 2px dashed rgba(255,255,255,0.1); border-radius: 25px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            font-size: 2.2rem; font-weight: 900; margin-bottom: 30px;
            position: relative; overflow: hidden; transition: 0.5s;
        }

        .picker-box.active {
            border-style: solid; border-color: var(--primary);
            box-shadow: 0 0 50px rgba(248, 6, 204, 0.2);
            background: rgba(248, 6, 204, 0.03);
        }

        #nameDisplay { transition: 0.1s; text-shadow: 0 0 10px rgba(255,255,255,0.2); }

        .winner-display {
            display: none; text-align: center;
            animation: winnerPop 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes winnerPop {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .controls { display: flex; gap: 15px; justify-content: center; }

        .btn {
            padding: 15px 35px; font-size: 1.1rem; font-weight: 900;
            border: none; border-radius: 15px; color: white; cursor: pointer;
            transition: 0.3s; display: flex; align-items: center; gap: 10px;
        }

        .btn-draw { background: linear-gradient(45deg, var(--primary), var(--secondary)); box-shadow: 0 10px 25px rgba(63, 94, 251, 0.3); }
        .btn-stop { background: var(--danger); display: none; box-shadow: 0 10px 25px rgba(255, 71, 87, 0.3); }
        
        .btn:hover:not(:disabled) { transform: translateY(-3px); filter: brightness(1.1); }
        .btn:disabled { opacity: 0.3; cursor: not-allowed; }

        .scan-line {
            position: absolute; width: 100%; height: 6px; background: var(--primary);
            top: 0; box-shadow: 0 0 30px var(--primary);
            animation: scan 1.5s infinite linear; display: none; z-index: 1;
        }

        @keyframes scan { 0% { top: -10%; } 100% { top: 110%; } }

        .progress-bar {
            position: absolute; bottom: 0; left: 0; height: 4px;
            background: var(--primary); width: 0%; transition: 0.1s linear;
        }
    </style>
</head>
<body>

    <div class="container">
        <div style="font-size: 3.5rem; margin-bottom: 10px;">🌌</div>
        <h1>ماراثون الحسم العشوائي</h1>
        
        <div class="stats-row">
            <div class="badge" id="totalCount">جاري الحصر...</div>
            <div class="badge timer-badge" id="timerDisplay">الوقت: 60.0s</div>
        </div>

        <div class="picker-box" id="pickerBox">
            <div id="scanLine" class="scan-line"></div>
            <div id="nameDisplay">مستعد للمفاجأة؟</div>
            
            <div class="winner-display" id="winnerUI">
                <div style="color: var(--gold); font-size: 1.2rem; margin-bottom: 10px;">🎊 الـفـائـز الـعـظـيـم 🎊</div>
                <div id="winnerName" style="color: #fff; text-shadow: 0 0 30px var(--primary); font-size: 3rem;"></div>
            </div>
            <div class="progress-bar" id="progressBar"></div>
        </div>

        <div class="controls">
            <button class="btn btn-draw" id="drawBtn">
                <i class="fas fa-play"></i> انطلاق السحب
            </button>
            <button class="btn btn-stop" id="stopBtn">
                <i class="fas fa-hand-paper"></i> إيقاف فوري!
            </button>
        </div>
        
        <a href="index.html" style="margin-top: 30px; color: #555; text-decoration: none; display: block; font-size: 0.8rem;">العودة للرئيسية</a>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
        import { getDatabase, ref, get, child } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCZr_OpkCfEFxeTrOc5fp7F_uvyVGlT5Yc",
            authDomain: "karamlat-99e6e.firebaseapp.com",
            databaseURL: "https://karamlat-99e6e-default-rtdb.firebaseio.com",
            projectId: "karamlat-99e6e",
            storageBucket: "karamlat-99e6e.firebasestorage.app",
            messagingSenderId: "817474436731",
            appId: "1:817474436731:web:6b4c38fd98048f1a3b6cde"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let participants = [];
        let drawInterval, timerInterval;
        const totalDuration = 60000; // 60 ثانية

        // جلب البيانات
        async function init() {
            const dbRef = ref(db);
            try {
                const snapshot = await get(child(dbRef, 'registrations'));
                if (snapshot.exists()) {
                    participants = Object.values(snapshot.val()).map(u => u.fullName);
                    document.getElementById('totalCount').innerText = `${participants.length} مشترك`;
                }
            } catch (e) { console.error(e); }
        }
        init();

        const drawBtn = document.getElementById('drawBtn');
        const stopBtn = document.getElementById('stopBtn');
        const nameDisplay = document.getElementById('nameDisplay');
        const winnerUI = document.getElementById('winnerUI');
        const timerDisplay = document.getElementById('timerDisplay');
        const progressBar = document.getElementById('progressBar');

        drawBtn.onclick = () => {
            if (participants.length === 0) return;

            // تجهيز الواجهة
            drawBtn.style.display = 'none';
            stopBtn.style.display = 'flex';
            winnerUI.style.display = 'none';
            nameDisplay.style.display = 'block';
            document.getElementById('scanLine').style.display = 'block';
            document.getElementById('pickerBox').classList.add('active');

            let startTime = Date.now();
            
            // 1. سرعة دوران الأسماء
            drawInterval = setInterval(() => {
                nameDisplay.innerText = participants[Math.floor(Math.random() * participants.length)];
            }, 60);

            // 2. مؤقت الـ 60 ثانية والـ Progress Bar
            timerInterval = setInterval(() => {
                let elapsed = Date.now() - startTime;
                let remaining = Math.max(0, (totalDuration - elapsed) / 1000);
                timerDisplay.innerText = `الوقت: ${remaining.toFixed(1)}s`;
                progressBar.style.width = `${(elapsed / totalDuration) * 100}%`;

                if (elapsed >= totalDuration) {
                    stopDrawing();
                }
            }, 100);
        };

        // زر الإيقاف الفوري
        stopBtn.onclick = () => {
            stopDrawing();
        };

        function stopDrawing() {
            clearInterval(drawInterval);
            clearInterval(timerInterval);
            
            const finalWinner = participants[Math.floor(Math.random() * participants.length)];
            
            document.getElementById('scanLine').style.display = 'none';
            nameDisplay.style.display = 'none';
            winnerUI.style.display = 'block';
            document.getElementById('winnerName').innerText = finalWinner;
            progressBar.style.width = '0%';
            
            stopBtn.style.display = 'none';
            drawBtn.style.display = 'flex';
            drawBtn.innerText = "سحب جديد 🔄";
            
            confetti({
                particleCount: 250,
                spread: 100,
                origin: { y: 0.6 },
                colors: ['#f806cc', '#3f5efb', '#ffcc00']
            });
        }
    </script>
</body>
</html>
