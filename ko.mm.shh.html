<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم كرملات 👑</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --p: #ff007f; --s: #00d4ff; --a: #ccff00; --bg: #050508;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
        }
        
        * { box-sizing: border-box; font-family: 'Cairo', sans-serif; outline: none; }
        
        body {
            background: var(--bg) url('https://www.transparenttextures.com/patterns/stardust.png');
            color: #fff; margin: 0; padding: 20px;
            background-attachment: fixed;
        }

        .admin-container { 
            max-width: 1100px; margin: 0 auto; 
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        h1 { 
            text-align: center; color: var(--p); 
            text-shadow: 0 0 15px rgba(255, 0, 127, 0.5); 
            margin-bottom: 40px; font-weight: 900;
        }
        
        .card {
            background: var(--glass); backdrop-filter: blur(15px);
            border: 1px solid var(--border); border-top: 2px solid var(--s);
            border-radius: 25px; padding: 30px; margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: 0.3s;
        }
        .card:hover { border-color: var(--p); transform: translateY(-5px); }

        .card-title { 
            font-size: 1.4rem; font-weight: 900; margin-bottom: 20px; 
            border-bottom: 1px solid var(--border); padding-bottom: 15px; 
            color: var(--a); display: flex; align-items: center; gap: 10px;
        }
        
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 700; color: #ccc; }
        
        input, textarea, select {
            width: 100%; padding: 15px; border-radius: 12px;
            border: 1px solid var(--border); background: rgba(0, 0, 0, 0.6); 
            color: #fff; font-size: 1rem; transition: 0.3s;
        }
        input:focus, select:focus, textarea:focus { border-color: var(--s); box-shadow: 0 0 15px rgba(0, 212, 255, 0.3); }
        
        .btn {
            background: linear-gradient(45deg, var(--p), var(--s));
            color: #fff; border: none; padding: 15px 30px; border-radius: 12px;
            font-weight: 900; font-size: 1.1rem; cursor: pointer; 
            transition: 0.4s; display: inline-flex; align-items: center; justify-content: center; gap: 8px;
            width: 100%; box-shadow: 0 5px 15px rgba(255, 0, 127, 0.3);
        }
        .btn:hover { transform: scale(1.02); box-shadow: 0 8px 25px rgba(0, 212, 255, 0.5); }
        .btn-danger { background: linear-gradient(45deg, #ff4b2b, #ff416c); width: auto; padding: 8px 15px; font-size: 0.9rem; }
        .btn-pin { background: linear-gradient(45deg, #f1c40f, #f39c12); width: auto; padding: 8px 15px; font-size: 0.9rem; color: #000; }
        .btn-edit { background: linear-gradient(45deg, #4facfe, #00f2fe); width: auto; padding: 8px 15px; font-size: 0.9rem; }

        .table-responsive { overflow-x: auto; border-radius: 15px; border: 1px solid var(--border); }
        table { width: 100%; border-collapse: collapse; background: rgba(0,0,0,0.4); }
        th, td { padding: 15px; text-align: right; border-bottom: 1px solid var(--border); }
        th { background: rgba(255, 0, 127, 0.2); color: #fff; }

        .preview-img { width: 120px; height: 120px; object-fit: cover; border-radius: 15px; margin-top: 15px; border: 2px dashed var(--s); display: none; }

        .items-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; margin-top: 20px; }
        .item-card { background: rgba(0,0,0,0.5); border: 1px solid var(--border); border-radius: 15px; padding: 15px; text-align: center; position: relative; }
        .item-card img { width: 100%; height: 100px; object-fit: cover; border-radius: 10px; margin-bottom: 10px; }
        .delete-badge { position: absolute; top: -10px; left: -10px; background: #ff4444; color: white; width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; }

        #toast-container { position: fixed; bottom: 20px; left: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 10px; }
        .toast { background: rgba(0, 0, 0, 0.9); border-right: 5px solid var(--a); color: #fff; padding: 15px 25px; border-radius: 10px; font-weight: bold; animation: slideIn 0.5s ease-out; }
        @keyframes slideIn { from { transform: translateX(-100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        
        .pinned-row { background: rgba(241, 196, 15, 0.1) !important; border-right: 4px solid var(--gold); }
    </style>
</head>
<body>

<div class="admin-container">
    <h1><i class="fas fa-user-astronaut"></i> مركز القيادة | KAREEM 👑</h1>

    <div class="card">
        <div class="card-title"><i class="fas fa-comments"></i> إدارة كلمات الجيش (الراديو)</div>
        <div class="table-responsive">
            <table>
                <thead>
                    <tr><th>الاسم</th><th>الرسالة</th><th>الحالة</th><th>إجراءات</th></tr>
                </thead>
                <tbody id="messagesBody">
                    <tr><td colspan="4" style="text-align:center;">جاري تحميل الكلمات...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="card">
        <div class="card-title"><i class="fas fa-trophy"></i> التحكم في المسابقة الكبرى</div>
        <div class="form-group">
            <label>حالة التسجيل:</label>
            <select id="contestStatus">
                <option value="open">🟢 التسجيل مفتوح الآن</option>
                <option value="closed">🔴 التسجيل مغلق (موسم الأخبار)</option>
            </select>
        </div>
        <div class="form-group">
            <label>العنوان الرئيسي للمسابقة:</label>
            <input type="text" id="contestMainTitle" placeholder="مثلاً: مفاجأة الـ 500">
        </div>
        <div class="form-group">
            <label>العنوان الفرعي:</label>
            <input type="text" id="contestSubTitle" placeholder="مثلاً: سحب عشوائي لجيش الإمبراطورية">
        </div>
        <div class="form-group">
            <label>وصف المسابقة / الرسالة عند الإغلاق:</label>
            <textarea id="contestDesc" rows="3" placeholder="اكتب تفاصيل المسابقة أو رسالة 'تابع القناة'"></textarea>
        </div>
        <button class="btn" onclick="saveContestSettings()"><i class="fas fa-save"></i> حفظ إعدادات المسابقة</button>
    </div>

    <div class="card">
        <div class="card-title"><i class="fas fa-users"></i> المسجلون في المسابقة</div>
        <div class="table-responsive">
            <table>
                <thead>
                    <tr><th>الأسم</th><th>الرقم</th><th>التاريخ</th><th>إجراء</th></tr>
                </thead>
                <tbody id="contestBody">
                    <tr><td colspan="4" style="text-align:center;">جاري التحميل...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="card">
        <div class="card-title"><i class="fas fa-paint-brush"></i> هوية الموقع</div>
        <div class="form-group">
            <label>تغيير اللوجو:</label>
            <input type="file" id="logoInput" accept="image/*" onchange="previewImage(this, 'logoPreview')">
            <img id="logoPreview" class="preview-img">
            <button class="btn" style="margin-top:15px;" id="btnLogo" onclick="uploadData('logo', 'logoInput', 'btnLogo')">حفظ اللوجو</button>
        </div>
        <div class="form-group">
            <label>نص العداد الختامي:</label>
            <input type="text" id="counterText">
            <button class="btn" style="margin-top:10px;" onclick="updateText('counterText')">تحديث النص</button>
        </div>
    </div>

    <div class="card">
        <div class="card-title"><i class="fas fa-bullhorn"></i> نظام الإعلانات</div>
        <div class="form-group"><label>نص الإعلان:</label><input type="text" id="adText"></div>
        <div class="form-group">
            <label>صورة الإعلان:</label>
            <input type="file" id="adImage" onchange="previewImage(this, 'adPreview')">
            <img id="adPreview" class="preview-img">
        </div>
        <div class="form-group">
            <label>حالة الإعلان:</label>
            <select id="adVisible"><option value="true">مرئي</option><option value="false">مخفي</option></select>
        </div>
        <button class="btn" id="btnAd" onclick="saveAd()">نشر الإعلان</button>
    </div>

    <div class="card">
        <div class="card-title"><i class="fas fa-crown"></i> لوحة الشرف</div>
        <div style="display: flex; gap: 10px;">
            <input type="text" id="legendName" placeholder="اسم الأسطورة...">
            <button class="btn" style="width: auto;" onclick="addLegend()"><i class="fas fa-plus"></i></button>
        </div>
        <div class="items-grid" id="legendsGrid"></div>
    </div>

    <div class="card">
        <div class="card-title"><i class="fas fa-birthday-cake"></i> سجل الاحتفالات</div>
        <div class="form-group"><input type="text" id="eventTitle" placeholder="عنوان الاحتفال"></div>
        <div class="form-group"><input type="file" id="eventImage" onchange="previewImage(this, 'eventPreview')"><img id="eventPreview" class="preview-img"></div>
        <button class="btn" id="btnEvent" onclick="addEvent()">توثيق الاحتفال</button>
        <div class="items-grid" id="eventsGrid"></div>
    </div>
</div>

<div id="toast-container"></div>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCZr_OpkCfEFxeTrOc5fp7F_uvyVGlT5Yc",
        authDomain: "karamlat-99e6e.firebaseapp.com",
        databaseURL: "https://karamlat-99e6e-default-rtdb.firebaseio.com",
        projectId: "karamlat-99e6e",
        storageBucket: "karamlat-99e6e.firebasestorage.app",
        messagingSenderId: "817474436731",
        appId: "1:817474436731:web:6b4c38fd98048f1a3b6cde"
    };
    firebase.initializeApp(firebaseConfig);
    const rtdb = firebase.database();

    function showToast(msg) {
        const container = document.getElementById('toast-container');
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.innerHTML = `<i class="fas fa-check-circle"></i> ${msg}`;
        container.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }

    function previewImage(input, previewId) {
        const file = input.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                const prev = document.getElementById(previewId);
                prev.src = e.target.result;
                prev.style.display = 'block';
            };
            reader.readAsDataURL(file);
        }
    }

    async function toBase64(file) {
        return new Promise((resolve) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => resolve(reader.result);
        });
    }

    // --- إدارة الكلمات (الراديو) ---
    rtdb.ref('kramlat_radio').on('value', (s) => {
        const body = document.getElementById('messagesBody');
        body.innerHTML = "";
        if(!s.exists()) { body.innerHTML = "<tr><td colspan='4'>لا توجد كلمات منشورة</td></tr>"; return; }
        
        s.forEach(child => {
            const v = child.val();
            const isPinned = v.pinned === true;
            body.innerHTML += `<tr class="${isPinned ? 'pinned-row' : ''}">
                <td><input type="text" id="name_${child.key}" value="${v.name}" style="padding:5px; border-radius:5px;"></td>
                <td><textarea id="msg_${child.key}" style="padding:5px; height:40px; border-radius:5px;">${v.message}</textarea></td>
                <td>${isPinned ? '📌 مثبتة' : 'عادية'}</td>
                <td style="display:flex; gap:5px;">
                    <button class="btn-edit" onclick="updateMessage('${child.key}')"><i class="fas fa-save"></i></button>
                    <button class="btn-pin" onclick="togglePin('${child.key}', ${isPinned})"><i class="fas fa-thumbtack"></i></button>
                    <button class="btn-danger" onclick="deleteMessage('${child.key}')"><i class="fas fa-trash"></i></button>
                </td>
            </tr>`;
        });
    });

    function updateMessage(key) {
        const newName = document.getElementById(`name_${key}`).value;
        const newMsg = document.getElementById(`msg_${key}`).value;
        rtdb.ref('kramlat_radio').child(key).update({
            name: newName,
            message: newMsg
        }).then(() => showToast('تم تحديث الرسالة!'));
    }

    function togglePin(key, currentStatus) {
        rtdb.ref('kramlat_radio').child(key).update({
            pinned: !currentStatus
        }).then(() => showToast(currentStatus ? 'تم إلغاء التثبيت' : 'تم التثبيت بنجاح!'));
    }

    function deleteMessage(key) {
        if(confirm('هل تريد حذف هذه الكلمة نهائياً؟')) {
            rtdb.ref('kramlat_radio').child(key).remove().then(() => showToast('تم الحذف!'));
        }
    }

    // إدارة المسابقة
    function saveContestSettings() {
        const settings = {
            status: document.getElementById('contestStatus').value,
            mainTitle: document.getElementById('contestMainTitle').value,
            subTitle: document.getElementById('contestSubTitle').value,
            desc: document.getElementById('contestDesc').value
        };
        rtdb.ref('admin_control/contest_settings').set(settings).then(() => showToast('تم الحفظ بنجاح!'));
    }

    rtdb.ref('admin_control/contest_settings').on('value', (s) => {
        const d = s.val();
        if(d) {
            document.getElementById('contestStatus').value = d.status;
            document.getElementById('contestMainTitle').value = d.mainTitle || '';
            document.getElementById('contestSubTitle').value = d.subTitle || '';
            document.getElementById('contestDesc').value = d.desc || '';
        }
    });

    // جلب المسجلين
    rtdb.ref('registrations').on('value', (s) => {
        const body = document.getElementById('contestBody');
        body.innerHTML = "";
        if(!s.exists()) { body.innerHTML = "<tr><td colspan='4'>لا يوجد مسجلين</td></tr>"; return; }
        s.forEach(child => {
            const v = child.val();
            body.innerHTML += `<tr>
                <td>${v.fullName}</td>
                <td>${v.userHandle}</td>
                <td>${new Date(v.timestamp).toLocaleDateString('ar-EG')}</td>
                <td><button class="btn-danger" onclick="deleteItem('registrations', '${child.key}')">حذف</button></td>
            </tr>`;
        });
    });

    // الوظائف العامة
    async function uploadData(path, inputId, btnId) {
        const file = document.getElementById(inputId).files[0];
        if(!file) return;
        const b64 = await toBase64(file);
        rtdb.ref('admin_control').child(path).set(b64).then(() => showToast('تم التحديث!'));
    }

    function updateText(id) {
        rtdb.ref('admin_control').child(id).set(document.getElementById(id).value).then(() => showToast('تم التحديث!'));
    }

    async function saveAd() {
        const file = document.getElementById('adImage').files[0];
        let img = document.getElementById('adPreview').src;
        if(file) img = await toBase64(file);
        rtdb.ref('admin_control/ad').set({
            text: document.getElementById('adText').value,
            image: img,
            visible: document.getElementById('adVisible').value === "true"
        }).then(() => showToast('تم نشر الإعلان!'));
    }

    function addLegend() {
        const name = document.getElementById('legendName').value;
        if(name) rtdb.ref('admin_control/hall_of_fame').push({name}).then(() => {
            document.getElementById('legendName').value = '';
            showToast('تمت الإضافة!');
        });
    }

    async function addEvent() {
        const file = document.getElementById('eventImage').files[0];
        if(!file) return;
        const img = await toBase64(file);
        rtdb.ref('admin_control/extra_events').push({
            title: document.getElementById('eventTitle').value,
            image: img
        }).then(() => showToast('تم توثيق الاحتفال!'));
    }

    function deleteItem(path, key) {
        if(confirm('متأكد؟')) {
            const refPath = path === 'registrations' ? 'registrations' : `admin_control/${path}`;
            rtdb.ref(refPath).child(key).remove().then(() => showToast('تم الحذف!'));
        }
    }

    // عرض العناصر
    rtdb.ref('admin_control/hall_of_fame').on('value', s => {
        const g = document.getElementById('legendsGrid'); g.innerHTML = "";
        s.forEach(c => {
            g.innerHTML += `<div class="item-card">
                <div class="delete-badge" onclick="deleteItem('hall_of_fame', '${c.key}')">×</div>
                <h4>${c.val().name}</h4>
            </div>`;
        });
    });

    rtdb.ref('admin_control/extra_events').on('value', s => {
        const g = document.getElementById('eventsGrid'); g.innerHTML = "";
        s.forEach(c => {
            g.innerHTML += `<div class="item-card">
                <div class="delete-badge" onclick="deleteItem('extra_events', '${c.key}')">×</div>
                <img src="${c.val().image}">
                <h4>${c.val().title}</h4>
            </div>`;
        });
    });
</script>
</body>
</html>
