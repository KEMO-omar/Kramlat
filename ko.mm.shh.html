<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم إمبراطورية كرملات 🛠️</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: 'Cairo', sans-serif;
            background: #0a0a0c; color: #fff; margin: 0; padding: 20px;
        }
        .admin-container { max-width: 1000px; margin: 0 auto; }
        h1 { text-align: center; color: #ff007f; text-shadow: 0 0 10px #ff007f; }
        
        .card {
            background: rgba(255, 255, 255, 0.05); border: 1px solid #ff007f;
            border-radius: 20px; padding: 20px; margin-bottom: 25px;
        }
        .card-title { font-size: 1.2rem; font-weight: 900; margin-bottom: 15px; border-bottom: 1px solid #333; padding-bottom: 10px; color: #ccff00; }
        
        input, textarea, select {
            width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px;
            border: 1px solid #00d4ff; background: #000; color: #fff;
        }
        
        .btn {
            background: linear-gradient(45deg, #ff007f, #00d4ff);
            color: #fff; border: none; padding: 12px 25px; border-radius: 10px;
            font-weight: 900; cursor: pointer; transition: 0.3s;
        }
        .btn:hover { transform: scale(1.05); filter: brightness(1.2); }
        .btn-danger { background: #ff4444; }

        table { width: 100%; border-collapse: collapse; margin-top: 15px; background: #111; border-radius: 10px; overflow: hidden; }
        th, td { padding: 12px; text-align: right; border-bottom: 1px solid #333; }
        th { background: #ff007f; color: #fff; }

        .preview-img { width: 100px; height: 100px; object-fit: cover; border-radius: 10px; margin-top: 10px; border: 1px solid #fff; display: none; }
    </style>
</head>
<body>

<div class="admin-container">
    <h1><i class="fas fa-user-shield"></i> لوحة تحكم الأدمن (كريم)</h1>

    <div class="card">
        <div class="card-title"><i class="fas fa-users"></i> المسجلون في المسابقة</div>
        <div style="overflow-x: auto;">
            <table id="contestTable">
                <thead>
                    <tr>
                        <th>الأسم الثلاثي</th>
                        <th>رقم الواتساب</th>
                        <th>التوقيت</th>
                        <th>إجراء</th>
                    </tr>
                </thead>
                <tbody id="contestBody">
                    </tbody>
            </table>
        </div>
    </div>

    <div class="card">
        <div class="card-title"><i class="fas fa-magic"></i> إعدادات الهيرو (الرئيسية)</div>
        <label>تغيير اللوجو:</label>
        <input type="file" id="logoInput" accept="image/*" onchange="previewImage(this, 'logoPreview')">
        <img id="logoPreview" class="preview-img">
        <button class="btn" onclick="uploadData('logo', 'logoInput')">حفظ اللوجو الجديد</button>

        <hr style="margin:20px 0; border-color:#333;">
        
        <label>نص نهاية العداد (بدل رمضان كريم):</label>
        <input type="text" id="counterText" placeholder="مثلاً: كراميلات للأبد 🍭">
        <button class="btn" onclick="updateText('counterText')">تحديث النص</button>
    </div>

    <div class="card">
        <div class="card-title"><i class="fas fa-ad"></i> التحكم في الإعلان العائم</div>
        <label>نص الإعلان:</label>
        <input type="text" id="adText" placeholder="اكتب نص الإعلان هنا...">
        <label>صورة الإعلان:</label>
        <input type="file" id="adImage" accept="image/*" onchange="previewImage(this, 'adPreview')">
        <img id="adPreview" class="preview-img">
        <label>حالة الإعلان:</label>
        <select id="adVisible">
            <option value="true">ظاهر ✅</option>
            <option value="false">مخفي ❌</option>
        </select>
        <button class="btn" onclick="saveAd()">نشر الإعلان</button>
    </div>

    <div class="card">
        <div class="card-title"><i class="fas fa-crown"></i> إضافة أسطورة للوحة الشرف</div>
        <input type="text" id="legendName" placeholder="اسم الأسطورة الجديد">
        <button class="btn" onclick="addLegend()">إضافة للوحة الشرف</button>
    </div>

    <div class="card">
        <div class="card-title"><i class="fas fa-birthday-cake"></i> إضافة احتفال جديد</div>
        <input type="text" id="eventTitle" placeholder="عنوان الاحتفال (مثلاً: احتفال الـ 600)">
        <input type="file" id="eventImage" accept="image/*" onchange="previewImage(this, 'eventPreview')">
        <img id="eventPreview" class="preview-img">
        <button class="btn" onclick="addEvent()">إضافة الاحتفال</button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCZr_OpkCfEFxeTrOc5fp7F_uvyVGlT5Yc",
        authDomain: "karamlat-99e6e.firebaseapp.com",
        databaseURL: "https://karamlat-99e6e-default-rtdb.firebaseio.com",
        projectId: "karamlat-99e6e",
        storageBucket: "karamlat-99e6e.firebasestorage.app",
        messagingSenderId: "817474436731",
        appId: "1:817474436731:web:6b4c38fd98048f1a3b6cde"
    };
    firebase.initializeApp(firebaseConfig);
    const rtdb = firebase.database();

    // 1. جلب المسجلين
    rtdb.ref('contest_entries').on('value', (snapshot) => {
        const body = document.getElementById('contestBody');
        body.innerHTML = "";
        snapshot.forEach((child) => {
            const data = child.val();
            body.innerHTML += `
                <tr>
                    <td>${data.name}</td>
                    <td>${data.phone}</td>
                    <td>${data.time}</td>
                    <td><button class="btn btn-danger" onclick="deleteEntry('${child.key}')">حذف</button></td>
                </tr>
            `;
        });
    });

    function deleteEntry(key) {
        if(confirm('متأكد انك عايز تمسح المتسابق ده؟')) rtdb.ref('contest_entries').child(key).remove();
    }

    // 2. معاينة الصور
    function previewImage(input, previewId) {
        const preview = document.getElementById(previewId);
        const file = input.files[0];
        const reader = new FileReader();
        reader.onloadend = () => {
            preview.src = reader.result;
            preview.style.display = 'block';
        }
        if (file) reader.readAsDataURL(file);
    }

    // 3. تحويل الصور لـ Base64 ورفعها
    async function toBase64(file) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => resolve(reader.result);
            reader.onerror = error => reject(error);
        });
    }

    async function uploadData(path, inputId) {
        const file = document.getElementById(inputId).files[0];
        if(!file) return alert('اختار صورة الأول!');
        const base64 = await toBase64(file);
        rtdb.ref('admin_control').child(path).set(base64)
        .then(() => alert('تم التحديث بنجاح!'));
    }

    function updateText(node) {
        const val = document.getElementById(node).value;
        rtdb.ref('admin_control').child(node).set(val)
        .then(() => alert('تم تحديث النص!'));
    }

    async function saveAd() {
        const text = document.getElementById('adText').value;
        const visible = document.getElementById('adVisible').value === "true";
        const file = document.getElementById('adImage').files[0];
        let imageData = document.getElementById('adPreview').src;

        if(file) imageData = await toBase64(file);
        
        rtdb.ref('admin_control/ad').set({
            text: text,
            image: imageData,
            visible: visible
        }).then(() => alert('تم نشر الإعلان!'));
    }

    function addLegend() {
        const name = document.getElementById('legendName').value;
        if(!name) return;
        rtdb.ref('admin_control/hall_of_fame').push({ name: name })
        .then(() => alert('تم إضافة الأسطورة!'));
    }

    async function addEvent() {
        const title = document.getElementById('eventTitle').value;
        const file = document.getElementById('eventImage').files[0];
        if(!title || !file) return alert('كمل البيانات!');
        
        const imageData = await toBase64(file);
        rtdb.ref('admin_control/extra_events').push({
            title: title,
            image: imageData
        }).then(() => alert('تم إضافة الاحتفال!'));
    }
</script>

</body>
</html>
