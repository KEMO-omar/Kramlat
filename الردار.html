<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم | إمبراطورية كرملات 👑</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --gold: #ffcc00;
            --primary: #f806cc;
            --secondary: #3f5efb;
            --bg: #050508;
            --danger: #ff4757;
        }

        body {
            margin: 0; padding: 0; font-family: 'Cairo', sans-serif;
            background: var(--bg); color: white; min-height: 100vh;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            overflow: hidden;
        }

        .container { text-align: center; z-index: 10; width: 90%; max-width: 600px; }

        h1 {
            font-size: 2.5rem; font-weight: 900; margin-bottom: 5px;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .badge {
            background: rgba(255,255,255,0.05); padding: 5px 15px;
            border-radius: 50px; font-size: 0.85rem; color: #aaa;
            border: 1px solid rgba(255,255,255,0.1); margin: 5px; display: inline-block;
        }

        .picker-box {
            height: 180px; background: rgba(255,255,255,0.02);
            border: 2px dashed rgba(255,255,255,0.1); border-radius: 25px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            font-size: 2.2rem; font-weight: 900; margin-bottom: 30px;
            position: relative; overflow: hidden;
        }

        .picker-box.active { border-style: solid; border-color: var(--primary); box-shadow: 0 0 50px rgba(248, 6, 204, 0.2); }

        .winner-display { display: none; text-align: center; animation: winnerPop 0.6s forwards; }

        @keyframes winnerPop { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        .btn { padding: 15px 35px; font-size: 1.1rem; font-weight: 900; border: none; border-radius: 15px; color: white; cursor: pointer; transition: 0.3s; display: flex; align-items: center; gap: 10px; margin: 0 auto; }
        .btn-draw { background: linear-gradient(45deg, var(--primary), var(--secondary)); }
        .btn-stop { background: var(--danger); display: none; }
        
        .progress-bar { position: absolute; bottom: 0; left: 0; height: 4px; background: var(--primary); width: 0%; }
        .live-tag { color: #ff4757; font-weight: bold; }
    </style>
</head>
<body>

    <div class="container">
        <div class="badge live-tag">● لوحة التحكم في البث المباشر</div>
        <h1>ماراثون الحسم (أدمن)</h1>
        
        <div class="stats-row">
            <div class="badge" id="totalCount">جاري الحصر...</div>
            <div class="badge" id="timerDisplay" style="color: var(--primary)">120.0s</div>
        </div>

        <div class="picker-box" id="pickerBox">
            <div id="nameDisplay">جاهز لبدء البث؟</div>
            <div class="winner-display" id="winnerUI">
                <div style="color: var(--gold); font-size: 1rem;">🎊 الفائز في البث 🎊</div>
                <div id="winnerName" style="color: #fff; font-size: 2.5rem;"></div>
            </div>
            <div class="progress-bar" id="progressBar"></div>
        </div>

        <button class="btn btn-draw" id="drawBtn"><i class="fas fa-broadcast-tower"></i> بدء البث والسحب</button>
        <button class="btn btn-stop" id="stopBtn"><i class="fas fa-hand-paper"></i> إيقاف فوري للكل</button>
        
        <a href="index.html" style="margin-top: 20px; color: #555; text-decoration: none; display: block;">الرجوع للرئيسية</a>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
        import { getDatabase, ref, get, child, set } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCZr_OpkCfEFxeTrOc5fp7F_uvyVGlT5Yc",
            authDomain: "karamlat-99e6e.firebaseapp.com",
            databaseURL: "https://karamlat-99e6e-default-rtdb.firebaseio.com",
            projectId: "karamlat-99e6e",
            storageBucket: "karamlat-99e6e.firebasestorage.app",
            messagingSenderId: "817474436731",
            appId: "1:817474436731:web:6b4c38fd98048f1a3b6cde"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let participants = [];
        let drawInterval, timerInterval;
        const totalDuration = 1500000;

        async function init() {
            const snap = await get(child(ref(db), 'registrations'));
            if (snap.exists()) {
                participants = Object.values(snap.val()).map(u => u.fullName);
                document.getElementById('totalCount').innerText = `${participants.length} مشترك`;
            }
        }
        init();

        const drawBtn = document.getElementById('drawBtn');
        const stopBtn = document.getElementById('stopBtn');
        const nameDisplay = document.getElementById('nameDisplay');
        const winnerUI = document.getElementById('winnerUI');
        const progressBar = document.getElementById('progressBar');

        drawBtn.onclick = () => {
            if (participants.length === 0) return;

            drawBtn.style.display = 'none';
            stopBtn.style.display = 'flex';
            winnerUI.style.display = 'none';
            nameDisplay.style.display = 'block';
            document.getElementById('pickerBox').classList.add('active');

            let startTime = Date.now();
            
            drawInterval = setInterval(() => {
                nameDisplay.innerText = participants[Math.floor(Math.random() * participants.length)];
            }, 70);

            timerInterval = setInterval(() => {
                let elapsed = Date.now() - startTime;
                let remaining = Math.max(0, (totalDuration - elapsed) / 1000);
                let prog = (elapsed / totalDuration) * 100;
                
                document.getElementById('timerDisplay').innerText = `${remaining.toFixed(1)}s`;
                progressBar.style.width = prog + "%";

                // تحديث Firebase للبث المباشر
                set(ref(db, 'liveStream'), {
                    status: "drawing",
                    progress: prog,
                    timer: remaining.toFixed(1) + "s",
                    timestamp: Date.now()
                });

                if (elapsed >= totalDuration) stopDrawing();
            }, 100);
        };

        stopBtn.onclick = stopDrawing;

        function stopDrawing() {
            clearInterval(drawInterval);
            clearInterval(timerInterval);
            
            const finalWinner = participants[Math.floor(Math.random() * participants.length)];
            
            nameDisplay.style.display = 'none';
            winnerUI.style.display = 'block';
            document.getElementById('winnerName').innerText = finalWinner;
            progressBar.style.width = '0%';
            
            stopBtn.style.display = 'none';
            drawBtn.style.display = 'flex';
            drawBtn.innerText = "إعادة بث سحب جديد 🔄";
            
            // تحديث Firebase بإعلان الفائز للكل
            set(ref(db, 'liveStream'), {
                status: "finished",
                winner: finalWinner,
                timestamp: Date.now()
            });

            confetti({ particleCount: 200, spread: 100, origin: { y: 0.6 } });
        }
    </script>
</body>
</html>
