<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>جاليريا العيد - كرملات</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>

    <div id="splash-screen">
        <div class="loader"></div>
        <h2 style="margin-top:20px">جاري تجهيز الألبوم...</h2>
    </div>

    <header class="main-header">
        <div class="header-top">
            <a href="index.html" class="back-home-btn">🏠</a>
            <div class="logo">📸 جاليريا العيد</div>
            <div id="online-count" class="online-tag">1 متصل</div>
        </div>
        <div class="stats-bar">
            <span id="photo-count">0</span> صورة في الألبوم
        </div>
    </header>

    <main id="gallery-container" class="gallery-grid">
        </main>

    <section class="upload-section">
        <div class="upload-container">
            <input type="text" id="user-name-input" placeholder="اكتب اسمك هنا (سيتم حفظه)..." class="name-field">
            <label for="image-upload" class="upload-btn">
                <span>➕ انشر صورتك الآن</span>
            </label>
            <input type="file" id="image-upload" accept="image/*" hidden>
            <a href="https://kemo-omar.github.io/Kramlat/" target="_blank" class="kramlat-link">إمبراطورية كرملات</a>
        </div>
    </section>

    <div id="image-modal" class="modal" onclick="this.style.display='none'">
        <div class="modal-content">
            <img id="modal-img" src="">
            <div id="modal-user-name" class="modal-caption"></div>
        </div>
    </div>

    <div id="notification-container"></div>

    <script type="module" src="script.js"></script>
</body>
</html>
