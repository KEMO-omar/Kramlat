<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مسابقات كرملات 👑</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #f806cc; --secondary: #3f5efb;
            --glass: rgba(255, 255, 255, 0.05);
            --neon: 0 0 20px rgba(248, 6, 204, 0.5);
        }

        body {
            margin: 0; font-family: 'Cairo', sans-serif;
            background: #050508 url('https://www.transparenttextures.com/patterns/stardust.png');
            color: white; min-height: 100vh;
            display: flex; justify-content: center; align-items: center; overflow-x: hidden;
        }

        .container {
            width: 90%; max-width: 450px; padding: 40px 20px;
            background: var(--glass); backdrop-filter: blur(20px);
            border-radius: 30px; border: 1px solid rgba(255,255,255,0.1);
            text-align: center; box-shadow: 0 25px 50px rgba(0,0,0,0.6);
            position: relative; animation: fadeIn 0.8s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        .logo-icon { font-size: 3.5rem; margin-bottom: 10px; display: inline-block; animation: bounce 2s infinite; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        h1 { margin: 10px 0; font-weight: 900; background: linear-gradient(45deg, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-size: 1.8rem; }
        h3 { color: #ccff00; font-size: 1.1rem; margin-bottom: 15px; }
        p { color: #bbb; font-size: 0.9rem; line-height: 1.6; }

        .form-section { display: none; margin-top: 30px; }
        .closed-section { display: none; margin-top: 30px; border: 2px dashed #ff4444; padding: 20px; border-radius: 20px; }

        .input-group { position: relative; margin-bottom: 20px; }
        .input-group i { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); color: var(--primary); }
        
        input {
            width: 100%; padding: 14px 45px 14px 15px; background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 15px;
            color: white; font-family: 'Cairo'; outline: none; transition: 0.3s; box-sizing: border-box;
        }
        input:focus { border-color: var(--primary); box-shadow: var(--neon); }

        .btn-action {
            width: 100%; padding: 16px; border: none; border-radius: 15px;
            color: white; font-weight: 900; font-size: 1.1rem; cursor: pointer;
            transition: 0.4s; display: block; text-decoration: none;
        }
        .btn-reg { background: linear-gradient(45deg, var(--primary), var(--secondary)); box-shadow: 0 5px 15px rgba(248, 6, 204, 0.3); }
        .btn-channel { background: #25d366; margin-top: 20px; }
        .btn-action:hover { transform: scale(1.03); filter: brightness(1.2); }

        .back-link { margin-top: 25px; display: inline-block; color: #888; text-decoration: none; font-size: 0.85rem; }
        #alert { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); padding: 15px 30px; border-radius: 12px; z-index: 1000; display: none; font-weight: bold; }
    </style>
</head>
<body>

<div id="alert"></div>

<div class="container">
    <div class="logo-icon">🍭</div>
    <h1 id="mainTitle">جاري التحميل...</h1>
    <h3 id="subTitle">يرجى الانتظار</h3>
    <p id="descText"></p>

    <div id="openView" class="form-section">
        <form id="regForm">
            <div class="input-group">
                <i class="fas fa-user-ninja"></i>
                <input type="text" id="uName" placeholder="اسمك الثلاثي يا بطل" required>
            </div>
            <div class="input-group">
                <i class="fab fa-whatsapp"></i>
                <input type="text" id="uHandle" placeholder="رقم الواتساب الخاص بك" required>
            </div>
            <button type="submit" id="sBtn" class="btn-action btn-reg">تأكيد الانضمام للمنافسة 🔥</button>
        </form>
    </div>

    <div id="closedView" class="closed-section">
        <h4 style="color: #ff4444;"><i class="fas fa-lock"></i> التسجيل متوقف حالياً</h4>
        <p>لا تقلق! نحن نحضر لشيء ضخم. تابع القناة الرسمية لتكون أول من يعرف عند فتح الموسم الجديد.</p>
        <a href="https://whatsapp.com/channel/0029VbAqgz23WHTOe8lXeM1N" class="btn-action btn-channel">
            <i class="fab fa-whatsapp"></i> متابعة آخر الأخبار
        </a>
    </div>

    <a href="index.html" class="back-link"><i class="fas fa-arrow-right"></i> العودة للمجرة الرئيسية</a>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
    import { getDatabase, ref, set, get, child, onValue } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCZr_OpkCfEFxeTrOc5fp7F_uvyVGlT5Yc",
        authDomain: "karamlat-99e6e.firebaseapp.com",
        databaseURL: "https://karamlat-99e6e-default-rtdb.firebaseio.com",
        projectId: "karamlat-99e6e",
        storageBucket: "karamlat-99e6e.firebasestorage.app",
        messagingSenderId: "817474436731",
        appId: "1:817474436731:web:6b4c38fd98048f1a3b6cde"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // مراقبة إعدادات الإدارة
    onValue(ref(db, 'admin_control/contest_settings'), (snapshot) => {
        const data = snapshot.val() || { status: 'closed', mainTitle: 'المسابقة الكبرى', desc: 'تابعنا للمزيد' };
        
        document.getElementById('mainTitle').innerText = data.mainTitle;
        document.getElementById('subTitle').innerText = data.subTitle || '';
        document.getElementById('descText').innerText = data.desc;

        if(data.status === 'open') {
            document.getElementById('openView').style.display = 'block';
            document.getElementById('closedView').style.display = 'none';
        } else {
            document.getElementById('openView').style.display = 'none';
            document.getElementById('closedView').style.display = 'block';
        }
    });

    function showAlert(msg, success) {
        const box = document.getElementById('alert');
        box.innerText = msg;
        box.style.background = success ? '#2ecc71' : '#e74c3c';
        box.style.display = 'block';
        setTimeout(() => box.style.display = 'none', 3000);
    }

    document.getElementById('regForm').onsubmit = async (e) => {
        e.preventDefault();
        const btn = document.getElementById('sBtn');
        const name = document.getElementById('uName').value;
        const handle = document.getElementById('uHandle').value.replace(/\D/g,'');

        btn.disabled = true;
        btn.innerText = "جاري الفحص...";

        try {
            const snap = await get(child(ref(db), `registrations/${handle}`));
            if(snap.exists()) {
                showAlert("عذراً! هذا الرقم مسجل بالفعل في جيش كرملات 🍭", false);
                btn.disabled = false;
                btn.innerText = "تأكيد الانضمام 🔥";
            } else {
                await set(ref(db, 'registrations/' + handle), {
                    fullName: name,
                    userHandle: handle,
                    timestamp: new Date().toISOString()
                });
                showAlert("تم تسجيلك بنجاح! استعد للمفاجأة 🚀", true);
                document.getElementById('regForm').reset();
                btn.innerText = "تم التسجيل بنجاح ✅";
            }
        } catch(err) {
            showAlert("حدث خطأ، يرجى المحاولة لاحقاً", false);
            btn.disabled = false;
        }
    };
</script>
</body>
</html>
