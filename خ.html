<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة شرف كرملات 2026 🍭🏆 - موقعة الحسم</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --winner-gold: #ffcc00;
            --final-glow: #ffcc00;
            --silver: #aaa;
            --semi-final-color: #00d4ff; 
            --primary-color: #f806cc;
            --secondary-color: #3f5efb;
            --bg-dark: #050508;
            --card-bg: rgba(255, 255, 255, 0.03);
            --ground-y: 90vh; /* الأرضية الافتراضية للكروت الساقطة */
        }

        body {
            margin: 0; padding: 0;
            font-family: 'Cairo', sans-serif;
            background: radial-gradient(circle at top, #1a0a2e 0%, #000000 100%);
            color: white; min-height: 100vh;
            display: flex; flex-direction: column; align-items: center;
            background-attachment: fixed;
            overflow-x: hidden;
            position: relative;
        }

        header { text-align: center; padding: 50px 20px; transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1); z-index: 100; }
        h1 {
            margin: 0; font-size: 3rem; font-weight: 900;
            background: linear-gradient(to right, var(--winner-gold), #fff, var(--winner-gold));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 15px rgba(255, 204, 0, 0.5));
            letter-spacing: 2px;
        }

        .section-title {
            width: 100%; text-align: center; margin: 50px 0 25px;
            font-size: 1.6rem; font-weight: 900; color: #fff;
            display: flex; align-items: center; justify-content: center; gap: 20px;
            transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .section-title i { color: var(--semi-final-color); }
        .section-title::before, .section-title::after {
            content: ""; height: 2px; width: 100px; 
            background: linear-gradient(to right, transparent, var(--semi-final-color), transparent);
        }

        .container {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px; padding: 20px; width: 90%; max-width: 1200px;
            transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }

        .name-card {
            background: var(--card-bg); backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 15px;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            text-align: center; padding: 20px; font-weight: 700;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.4s;
            animation: fadeInUp 0.6s ease backwards;
            position: relative; overflow: hidden;
            cursor: default;
            box-sizing: border-box; /* للحفاظ على الأبعاد دقيقة */
        }
        .name-card:hover:not(.exploding) { transform: scale(1.1) translateY(-10px); z-index: 10; border-color: rgba(255,255,255,0.3); }

        /* 🔥 تصنيف النهائي الكبير 🔥 */
        .rank-final {
            border: 3px solid var(--final-glow);
            background: rgba(255, 204, 0, 0.2);
            box-shadow: 0 0 50px rgba(255, 204, 0, 0.6);
            font-size: 1.5rem; font-weight: 900;
            color: #fff; text-shadow: 0 0 10px #000;
            cursor: pointer;
        }
        .rank-final::before {
            content: "👑 النهائي الكبير 👑"; position: absolute; top: 0; left: 50%;
            transform: translateX(-50%); background: var(--final-glow);
            color: #000; font-size: 0.7rem; padding: 3px 15px; border-radius: 0 0 10px 10px;
            font-weight: 900;
        }

        /* تصنيفات الأدوار السابقة */
        .rank-semi { border: 2px solid var(--silver); background: rgba(170, 170, 170, 0.1); box-shadow: 0 0 30px rgba(170, 170, 170, 0.3); font-size: 1.2rem; }
        .rank-8 { border: 1px solid var(--winner-gold); background: rgba(255, 204, 0, 0.05); color: #ccc; font-size: 0.9rem; }
        .rank-16 { border: 1px solid var(--secondary-color); opacity: 0.7; font-size: 0.85rem; }
        .rank-32 { border: 1px solid var(--primary-color); opacity: 0.6; font-size: 0.8rem; }
        .rank-64 { border: 1px solid rgba(255,255,255,0.2); opacity: 0.4; font-size: 0.75rem; color: #888; }

        .back-btn {
            display: inline-flex; align-items: center; padding: 12px 30px;
            background: linear-gradient(45deg, var(--primary-color), var(--secondary-color));
            border-radius: 50px; color: white; text-decoration: none; font-weight: 900;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); margin-top: 20px; box-shadow: 0 5px 20px rgba(248, 6, 204, 0.4);
            z-index: 100;
        }
        .back-btn:hover { transform: translateY(-3px); box-shadow: 0 8px 25px var(--primary-color); }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 💥 أنيميشن الانفجار الكبير 💥 */
        @keyframes explosionEffect {
            0% { transform: scale(1); opacity: 1; }
            30% { transform: scale(3) rotate(15deg); filter: contrast(200%) brightness(300%) blur(5px); opacity: 0.8; }
            100% { transform: scale(1) translateY(100vh) rotate(540deg); opacity: 0; }
        }

        @media (max-width: 600px) {
            .container { grid-template-columns: repeat(2, 1fr); gap: 12px; }
            h1 { font-size: 2rem; }
            .section-title { font-size: 1.2rem; }
            .rank-final { font-size: 1.2rem; }
        }
    </style>
</head>
<body>

    <header id="mainHeader">
        <h1>🏆 لوحة شرف كرملات 🏆</h1>
        <p style="color: #aaa; margin-top: 10px;">الإصدار النهائي - موقعة الحسم</p>
        <a href="index.html" class="back-btn"><i class="fas fa-arrow-right"></i> العودة للرئيسية</a>
    </header>
>

    <div class="footer" style="padding: 60px; text-align: center; color: rgba(255,255,255,0.2); font-size: 0.9rem; transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1);">
        جميع الحقوق محفوظة لمسابقة كرملات © 2026 <br>
        تم التحديث بواسطة الإمبراطور كيمو 👑
    </div>

    <script>
        let isExploded = false;

        function triggerExplosion(clickedCard) {
            if (isExploded) return;
            isExploded = true;

            // 1. إضافة تأثير الانفجار الكرتوني على الكارت المضغوط
            clickedCard.classList.add('exploding');
            clickedCard.style.animation = 'explosionEffect 1s forwards';

            // 2. تفعيل تأثير "الفيزياء الدقيقة" للتراكم
            const allCards = Array.from(document.querySelectorAll('.name-card:not(.exploding)'));
            const otherElements = document.querySelectorAll('header, .section-title, .footer, .back-btn');

            // إخفاء العناصر غير الكروت ببطء
            otherElements.forEach(el => {
                el.style.opacity = '0';
                el.style.transform = 'translateY(-50px)';
            });

            // حساب الأرضية الافتراضية بناءً على طول الشاشة
            const groundY = window.innerHeight * 0.9;
            let currentX = 20; // نقطة البداية الأفقية
            let currentY = groundY; // الارتفاع الحالي للصف
            let maxRowHeight = 0; // طول أطول كرت في الصف الحالي

            allCards.forEach((card, index) => {
                // تصفير التأثيرات السابقة
                card.style.animation = 'none';
                card.style.transition = 'none';
                card.style.position = 'fixed';
                card.style.zIndex = '50';

                // حساب موقع الكارت الحالي قبل تفعيل الجاذبية
                const rect = card.getBoundingClientRect();
                card.style.top = rect.top + 'px';
                card.style.left = rect.left + 'px';
                card.style.width = rect.width + 'px';
                
                // تحديث أقصى طول للصف
                maxRowHeight = Math.max(maxRowHeight, rect.height);

                // حساب موقعه الجديد على الأرضية الدقيقة (التراكم)
                if (currentX + rect.width + 20 > window.innerWidth) {
                    // الصف خلص، انزل للصف اللي تحته (تراكم فوق بعض)
                    currentX = 20; // ارجع للبداية الأفقية
                    currentY -= maxRowHeight + 10; // انزل فوق الصف اللي فات
                    maxRowHeight = rect.height; // صفر أقصى طول للصف الجديد
                }

                const targetX = currentX;
                const targetY = currentY - rect.height; // عشان يترص من تحت لفوق

                // تحديث الإحداثيات الأفقية للكارت الجاي
                currentX += rect.width + 10;

                // تفعيل الجاذبية الدقيقة بتتابع سريع (Cascade)
                setTimeout(() => {
                    card.style.transition = `all 1.2s cubic-bezier(0.5, 0.1, 0.7, 1.2)`; // فيزياء سقوط أكثر واقعية
                    
                    // السقوط للأرضية الافتراضية بدقة
                    card.style.top = targetY + 'px'; // الموقع العمودي الدقيق (التراكم)
                    card.style.left = targetX + 'px'; // الموقع الأفقي الدقيق

                    // دوران عشوائي خفيف جداً ومقروء
                    const randomRotation = (Math.random() - 0.5) * 15; // دوران بين -7.5 و 7.5 درجة

                    card.style.transform = `translateY(0) rotate(${randomRotation}deg)`;
                    card.style.opacity = '1'; // الكروت بتفضل واضحة ومقروءة
                }, index * 15); // تتابع سريع في الوقوع
            });

            // 3. العودة للرئيسية بعد الانفجار بـ 3.5 ثواني
            setTimeout(() => {
                window.location.href = 'index.html';
            }, 8500);
        }
    </script>

</body>
</html>
